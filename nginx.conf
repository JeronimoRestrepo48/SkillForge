server {
    listen 80;
    client_max_body_size 20M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -----------------------------------------------------------------------
    # Microservicios FastAPI — enrutamiento directo sin gateway intermedio
    # Se usa DNS dinámico de Docker (resolver 127.0.0.11) para tolerar que
    # un servicio aún no haya levantado al inicio de Nginx.
    # -----------------------------------------------------------------------

    location /api/auth/ {
        set $auth_upstream http://auth-service:8000;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/catalog/ {
        set $catalog_upstream http://catalog-service:8000;
        proxy_pass $catalog_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/transactions/ {
        set $transactions_upstream http://transactions-service:8000;
        proxy_pass $transactions_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/certificates/ {
        set $certificate_upstream http://certificate-service:8000;
        proxy_pass $certificate_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Redirigir el tráfico web principal al contenedor de la SPA de Frontend
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
