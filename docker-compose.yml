# Ecosistema completo Entregable 2: Django + Flask (strangler + microservices) + Nginx + PostgreSQL + Redis + Celery
# Uso local y AWS Academy (EC2). Ver docs/DESPLIEGUE_AWS.md



services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker-high:
    build: .
    env_file:
      - .env
    command: celery -A shared.celery_app worker -l info -Q high_priority -c 2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}

  worker-documents:
    build: .
    env_file:
      - .env
    command: celery -A shared.celery_app worker -l info -Q documents,dead_letter -c 2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}

  worker-reports:
    build: .
    env_file:
      - .env
    command: celery -A shared.celery_app worker -l info -Q reports -c 1
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      
  celery-beat:
    build: .
    env_file:
      - .env
    command: celery -A shared.celery_app beat -l info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"


  # --- Microservicios (artefacto final) ---
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: authdb
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalogdb
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalogdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  transactions-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transactions
      POSTGRES_PASSWORD: transactions
      POSTGRES_DB: transactionsdb
    volumes:
      - transactions_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions -d transactionsdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build: ./microservices/services/auth-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://auth:auth@auth-db:5432/authdb
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  catalog-service:
    build: ./microservices/services/catalog-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://catalog:catalog@catalog-db:5432/catalogdb
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      catalog-db:
        condition: service_healthy
    volumes:
      - ./microservices/services/catalog-service:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  transactions-service:
    build:
      context: .
      dockerfile: microservices/services/transactions-service/Dockerfile
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://transactions:transactions@transactions-db:5432/transactionsdb
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      transactions-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  certificate-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: certificate
      POSTGRES_PASSWORD: certificate
      POSTGRES_DB: certificatedb
    volumes:
      - certificate_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certificate -d certificatedb"]
      interval: 5s
      timeout: 3s
      retries: 20

  certificate-service:
    build:
      context: .
      dockerfile: microservices/services/certificate-service/Dockerfile
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://certificate:certificate@certificate-db:5432/certificatedb
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
    depends_on:
      certificate-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillforge-frontend
    # El puerto 8080 se expone únicamente para depuración/debugging local.
    # En producción todo el tráfico entra a través de Nginx en el puerto 80.
    ports:
      - "8080:80"
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      transactions-service:
        condition: service_healthy
      certificate-service:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  auth_db_data:
  catalog_db_data:
  transactions_db_data:
  certificate_db_data:
