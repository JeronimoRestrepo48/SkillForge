# Ecosistema completo Entregable 2: Django + Flask (strangler + microservices) + Nginx + PostgreSQL + Redis + Celery
# Uso local y AWS Academy (EC2). Ver docs/DESPLIEGUE_AWS.md

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillforge
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge -d skillforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web_django:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             (python manage.py crear_datos_iniciales || true) &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: "strangler-dev-key-change-on-aws"
      ALLOWED_HOSTS: "localhost,127.0.0.1,nginx,*"
      DATABASE_URL: "postgres://skillforge:skillforge@db:5432/skillforge"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "false"
      ALLY_SERVICE_URL: "${ALLY_SERVICE_URL:-}"
      FRANKFURTER_API_URL: "https://api.frankfurter.app"

  celery_worker:
    build: .
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web_django:
        condition: service_started
    environment:
      DEBUG: "False"
      SECRET_KEY: "strangler-dev-key-change-on-aws"
      DATABASE_URL: "postgres://skillforge:skillforge@db:5432/skillforge"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "false"

  checkout_flask:
    build: ./microservicio_checkout
    expose:
      - "5000"

  # --- Microservicios (artefacto final) ---
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: authdb
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalogdb
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalogdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  transactions-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transactions
      POSTGRES_PASSWORD: transactions
      POSTGRES_DB: transactionsdb
    volumes:
      - transactions_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions -d transactionsdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build: ./microservices/services/auth-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://auth:auth@auth-db:5432/authdb
      JWT_SECRET: skillforge-dev-secret
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  catalog-service:
    build: ./microservices/services/catalog-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://catalog:catalog@catalog-db:5432/catalogdb
    depends_on:
      catalog-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  transactions-service:
    build: ./microservices/services/transactions-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://transactions:transactions@transactions-db:5432/transactionsdb
    depends_on:
      transactions-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  gateway:
    build: ./microservices/gateway
    expose:
      - "8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      TRANSACTIONS_SERVICE_URL: http://transactions-service:8000
      JWT_SECRET: skillforge-dev-secret
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      transactions-service:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web_django
      - checkout_flask
      - gateway
      - celery_worker

volumes:
  db_data:
  auth_db_data:
  catalog_db_data:
  transactions_db_data:
